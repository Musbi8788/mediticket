services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mediticket
      POSTGRES_PASSWORD: mediticket
      POSTGRES_DB: mediticket
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediticket -d mediticket"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://mediticket:mediticket@db:5432/mediticket
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
